<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --ink:    #06060A;
    --ink-2:  #0A0A12;
    --bone:   #EEEAF6;
    --bone-2: #C8C2D8;
    --line:        rgba(180,170,255,0.09);
    --line-strong: rgba(180,170,255,0.20);
    --mute:        rgba(238,234,246,0.45);
    --mute-2:      rgba(238,234,246,0.65);
    --violet: oklch(0.72 0.22 285);
    --violet-2: oklch(0.62 0.20 280);
    --cyan: oklch(0.85 0.14 220);
    --accent: oklch(0.72 0.22 285);
  }
  html, body { background: var(--ink); color: var(--bone); min-height: 100%; overflow-x: hidden; }
  body {
    font-family: 'Inter Tight', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  #root { min-height: 100vh; }
  .font-mono   { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .font-serif  { font-family: 'Instrument Serif', serif; }
  .serif-it    { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }
  .display     { font-family: 'Inter Tight', sans-serif; font-weight: 400; letter-spacing: -0.035em; line-height: 0.96; }
  .display-serif { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; line-height: 0.98; }

  /* ----- Unified ambient background — one continuous canvas ----- */
  .ambient-bg {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(80% 60% at 50% 0%, rgba(139,125,255,0.08) 0%, transparent 60%),
      radial-gradient(60% 50% at 50% 100%, rgba(125,200,255,0.04) 0%, transparent 65%),
      linear-gradient(180deg, #06060A 0%, #07070D 100%);
  }
  .ambient-bg::after {
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(rgba(180,170,255,0.05) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(70% 60% at 50% 30%, black 0%, transparent 90%);
    -webkit-mask-image: radial-gradient(70% 60% at 50% 30%, black 0%, transparent 90%);
    opacity: 0.5;
  }
  /* Smoke / floating ambient particles */
  .smoke {
    position: fixed; inset:0; pointer-events:none; z-index: 1;
    overflow: hidden;
    mix-blend-mode: screen;
    opacity: 0.55;
  }
  .smoke .blob {
    position: absolute; width: 480px; height: 480px;
    border-radius: 50%; filter: blur(80px);
    opacity: 0.16;
    will-change: transform;
  }
  .smoke .b1 { background: oklch(0.55 0.18 285); top: 8%;  left: -10%; animation: drift1 38s ease-in-out infinite; }
  .smoke .b2 { background: oklch(0.45 0.22 280); top: 55%; right: -8%; animation: drift2 46s ease-in-out infinite; }
  .smoke .b3 { background: oklch(0.50 0.16 240); top: 110%; left: 30%; animation: drift3 52s ease-in-out infinite; }
  .smoke .b4 { background: oklch(0.55 0.18 285); top: 180%; right: 10%; animation: drift1 44s ease-in-out infinite reverse; }
  @keyframes drift1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(60px,80px) scale(1.15); } }
  @keyframes drift2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-90px,-40px) scale(1.2); } }
  @keyframes drift3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(70px,-60px) scale(1.1); } }
  @keyframes floatDot {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    20%  { opacity: 0.5; }
    80%  { opacity: 0.5; }
    100% { transform: translateY(-180px) translateX(20px); opacity: 0; }
  }
  /* Beam canvas — fixed full-viewport so it persists across the whole page */
  .beam-canvas {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    width: 100vw; height: 100vh;
    display: block;
  }

  /* ----- Surfaces ----- */
  .surface {
    position: relative;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(180,170,255,0.05) 0%, rgba(180,170,255,0) 55%),
      linear-gradient(180deg, rgba(255,255,255,0.018) 0%, rgba(255,255,255,0.005) 100%);
    border: 1px solid rgba(180,170,255,0.10);
    border-radius: 28px;
    overflow: hidden;
    transition: border-color .5s ease, transform .5s cubic-bezier(.2,.8,.2,1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .surface::before {
    content:"";
    position:absolute; inset:0 0 auto 0; height:1px;
    background: linear-gradient(90deg, transparent, rgba(180,170,255,0.22) 50%, transparent);
    pointer-events:none;
  }
  .surface:hover { border-color: rgba(180,170,255,0.20); }

  .pill {
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 11px;
    border:1px solid rgba(180,170,255,0.14);
    border-radius:999px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px; letter-spacing:0.16em; text-transform:uppercase;
    color: var(--mute-2);
    background: rgba(180,170,255,0.02);
  }
  .pill-violet { color: oklch(0.85 0.14 285); border-color: oklch(0.72 0.22 285 / 0.40); background: oklch(0.72 0.22 285 / 0.08); }

  .ghost-btn {
    display:inline-flex; align-items:center; gap:10px;
    padding:11px 16px; border-radius:14px;
    background: rgba(180,170,255,0.04);
    border:1px solid rgba(180,170,255,0.10);
    color: var(--bone);
    font-size:13.5px; letter-spacing:-0.005em;
    transition: background .3s, border-color .3s;
  }
  .ghost-btn:hover { background: rgba(180,170,255,0.08); border-color: rgba(180,170,255,0.24); }
  .ghost-btn .arr { transition: transform .3s cubic-bezier(.2,.8,.2,1); }
  .ghost-btn:hover .arr { transform: translateX(3px); }

  .primary-btn {
    display:inline-flex; align-items:center; gap:10px;
    padding:14px 22px; border-radius:999px;
    background: var(--bone); color: var(--ink);
    font-size:14px; font-weight:500; letter-spacing:-0.01em;
    transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s;
  }
  .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 18px 60px -16px rgba(139,125,255,0.55); }
  .primary-btn .arr { transition: transform .35s cubic-bezier(.2,.8,.2,1); }
  .primary-btn:hover .arr { transform: translateX(4px); }

  .violet-btn {
    display:inline-flex; align-items:center; gap:10px;
    padding:14px 22px; border-radius:999px;
    color: var(--bone);
    font-size:14px; font-weight:500; letter-spacing:-0.01em;
    background: linear-gradient(180deg, oklch(0.72 0.22 285), oklch(0.55 0.22 285));
    box-shadow: 0 0 0 1px rgba(255,255,255,0.10) inset, 0 18px 50px -16px rgba(139,125,255,0.55);
    transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s;
  }
  .violet-btn:hover { transform: translateY(-1px); box-shadow: 0 0 0 1px rgba(255,255,255,0.14) inset, 0 26px 60px -16px rgba(139,125,255,0.7); }
  .violet-btn .arr { transition: transform .35s cubic-bezier(.2,.8,.2,1); }
  .violet-btn:hover .arr { transform: translateX(4px); }

  /* ----- Pulse dots ----- */
  @keyframes pulseDot {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 oklch(0.72 0.22 285 / 0.5); }
    50%     { opacity:.6; box-shadow: 0 0 0 5px oklch(0.72 0.22 285 / 0); }
  }
  .pulse-dot { animation: pulseDot 2.4s ease-in-out infinite; }

  /* ----- Service motion (literal to each service) ----- */

  /* Order flow — packets traveling the rails */
  @keyframes packetTravel {
    0%   { offset-distance: 0%;   opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  .rail { stroke-dasharray: 3 4; stroke-dashoffset: 0; animation: railFlow 6s linear infinite; }
  @keyframes railFlow { to { stroke-dashoffset: -56; } }
  @keyframes hubPulse {
    0%,100% { transform: scale(1);   opacity: 1; }
    50%     { transform: scale(1.15); opacity: 0.85; }
  }
  .hub-ring { transform-origin: center; animation: hubPulse 2.4s ease-in-out infinite; }
  @keyframes counterTick {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.65; }
  }
  .counter-tick { animation: counterTick 1.2s ease-in-out infinite; }

  /* Web — page scroll + lighthouse score arc */
  @keyframes pageScroll {
    0%, 12%   { transform: translateY(0); }
    50%, 62%  { transform: translateY(-180px); }
    100%      { transform: translateY(0); }
  }
  .page-scroll { animation: pageScroll 9s cubic-bezier(.6,0,.4,1) infinite; }
  @keyframes scoreFill {
    from { stroke-dashoffset: 240; }
    to   { stroke-dashoffset: 24; }
  }
  .score-arc { animation: scoreFill 2s cubic-bezier(.4,0,.2,1) forwards; }

  /* Chat reply */
  @keyframes chatIn {
    0%, 12%   { opacity: 0; transform: translateY(8px); }
    18%, 90%  { opacity: 1; transform: translateY(0); }
    100%      { opacity: 0; transform: translateY(-4px); }
  }
  .chat-bubble { animation: chatIn 9s ease-in-out infinite; }
  .chat-bubble.b2 { animation-delay: 1.5s; }
  .chat-bubble.b3 { animation-delay: 3.0s; }
  @keyframes typing {
    0%,60%,100% { opacity: 0.25; }
    30%         { opacity: 1; }
  }
  .dot-1 { animation: typing 1.2s ease-in-out infinite; }
  .dot-2 { animation: typing 1.2s ease-in-out infinite 0.2s; }
  .dot-3 { animation: typing 1.2s ease-in-out infinite 0.4s; }

  /* Inventory bars */
  @keyframes invBar {
    0%   { transform: scaleY(0.6); }
    50%  { transform: scaleY(1); }
    100% { transform: scaleY(0.6); }
  }
  .inv-bar { transform-origin: bottom; animation: invBar 4s ease-in-out infinite; }

  /* Inbox new message slide-in */
  @keyframes inboxIn {
    0%   { transform: translateY(-8px); opacity: 0; max-height: 0; }
    20%  { opacity: 1; max-height: 60px; }
    100% { opacity: 1; transform: translateY(0); max-height: 60px; }
  }
  .inbox-row { animation: inboxIn 0.6s cubic-bezier(.2,.8,.2,1) both; }

  /* Forecast line scanning */
  @keyframes scanSweep {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .scan-sweep { animation: scanSweep 5s linear infinite; }

  /* Totem buttons */
  @keyframes totemTap {
    0%, 90%, 100% { transform: scale(1); background: rgba(180,170,255,0.05); border-color: rgba(180,170,255,0.10); }
    93%, 97%      { transform: scale(0.97); background: oklch(0.72 0.22 285 / 0.25); border-color: oklch(0.72 0.22 285 / 0.55); }
  }
  .totem-btn { animation: totemTap 6s ease-in-out infinite; }
  .totem-btn.t2 { animation-delay: 1.5s; }
  .totem-btn.t3 { animation-delay: 3.0s; }
  .totem-btn.t4 { animation-delay: 4.5s; }

  .tnum { font-variant-numeric: tabular-nums; }

  /* Card expand */
  .expander {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.7s cubic-bezier(.2,.8,.2,1), opacity 0.4s ease;
  }
  .expander.open {
    max-height: 1200px;
    opacity: 1;
  }

  .metric-num {
    font-family:'Instrument Serif', serif;
    font-weight:400; letter-spacing:-0.03em; line-height:0.92;
    background: linear-gradient(180deg, var(--bone) 0%, rgba(238,234,246,0.55) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ----- Hover details (cursor-driven life) ----- */

  /* Pills: brighten + lift on hover */
  .pill {
    transition: background 0.35s ease, border-color 0.35s ease, color 0.35s ease, transform 0.35s cubic-bezier(.2,.8,.2,1);
  }
  .pill:hover {
    background: rgba(180,170,255,0.07);
    border-color: rgba(180,170,255,0.30);
    color: var(--bone);
    transform: translateY(-1px);
  }
  .pill-violet:hover {
    background: oklch(0.72 0.22 285 / 0.16);
    border-color: oklch(0.72 0.22 285 / 0.65);
    color: oklch(0.92 0.10 285);
  }

  /* Nav links: soft pill bg appears on hover */
  .nav-link {
    transition: color 0.3s ease, background 0.3s ease;
  }
  .nav-link:hover {
    background: rgba(180,170,255,0.06);
    color: var(--bone);
  }

  /* Service / surface card: borde + lift sutil + glow interno bajo cursor */
  .surface {
    transition: border-color 0.5s ease, transform 0.5s cubic-bezier(.2,.8,.2,1), box-shadow 0.5s ease;
  }
  .surface:hover {
    border-color: rgba(180,170,255,0.28);
    transform: translateY(-2px);
    box-shadow: 0 30px 70px -30px oklch(0.55 0.20 285 / 0.45);
  }
  /* spotlight that follows cursor (set --mx/--my via JS) */
  .surface::after {
    content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background: radial-gradient(180px 180px at var(--mx, 50%) var(--my, 50%), oklch(0.72 0.22 285 / 0.10), transparent 70%);
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 0;
  }
  .surface:hover::after { opacity: 1; }
  .surface > * { position: relative; z-index: 1; }

  /* Eyebrow labels: color shift on hover of parent card */
  .eyebrow {
    transition: color 0.4s ease, letter-spacing 0.4s ease;
  }
  .surface:hover .eyebrow { color: oklch(0.85 0.14 285); }

  /* Status dot: ring on hover */
  .pulse-dot {
    transition: box-shadow 0.4s ease;
  }
  .pill:hover .pulse-dot {
    box-shadow: 0 0 0 4px oklch(0.72 0.22 285 / 0.20), 0 0 8px oklch(0.72 0.22 285 / 0.55);
  }

  /* Metric numbers: subtle color warming on hover */
  .metric-num { transition: filter 0.5s ease; }
  .surface:hover .metric-num {
    filter: drop-shadow(0 0 14px oklch(0.72 0.22 285 / 0.35));
  }

  /* Ghost / primary buttons already have hover; just add the same lift */

  @media (prefers-reduced-motion: reduce) {
    .order-tile,.chat-bubble,.dot-1,.dot-2,.dot-3,.inv-bar,.totem-btn,.pulse-dot { animation: none !important; }
  }

  /* ---- Responsive beam layouts ---- */
  .beam-layout { display: flex; flex-direction: column; gap: 20px; }
  .beam-gap    { display: none; }
  .beam-col    { display: flex; flex-direction: column; gap: 20px; }
  .metrics-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  @media (max-width: 479px) {
    .metrics-cards { grid-template-columns: 1fr; }
  }
  @media (min-width: 1280px) {
    .beam-layout { display: grid; gap: 24px; grid-template-columns: 1fr clamp(60px, 8vw, 160px) 1fr; }
    .beam-gap    { display: block; }
    .beam-col    { display: grid; grid-template-rows: repeat(3, 1fr); gap: 20px; }
  }

  /* Mobile: darken cards + dim beam so text is readable */
  @media (max-width: 1279px) {
    .beam-canvas { opacity: 0.35; }
    .surface {
      background:
        radial-gradient(120% 80% at 50% -10%, rgba(180,170,255,0.06) 0%, rgba(180,170,255,0) 55%),
        linear-gradient(180deg, rgba(8,6,18,0.88) 0%, rgba(8,6,18,0.84) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  }
</style>

<!-- ====================== ENERGY BEAM SHADER ====================== -->
<script id="frag-shader" type="x-shader/x-fragment">
precision highp float;
uniform vec2 u_resolution;
uniform float u_time;
varying vec2 v_uv;

// hash + simplex noise (Ashima)
vec3 mod289(vec3 x){return x - floor(x*(1.0/289.0))*289.0;}
vec2 mod289(vec2 x){return x - floor(x*(1.0/289.0))*289.0;}
vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}
float snoise(vec2 v){
  const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                     -0.577350269189626, 0.024390243902439);
  vec2 i  = floor(v + dot(v, C.yy));
  vec2 x0 = v -   i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))
                   + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
  m = m*m; m = m*m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
  vec3 g;
  g.x  = a0.x  * x0.x  + h.x  * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

// Beam profile around x=cx with width w
float beam(vec2 uv, float cx, float w){
  float d = abs(uv.x - cx);
  // inverse-distance falloff (premium glow)
  return w / (d + w * 0.05);
}

vec3 sampleBeam(vec2 uv, float t, float dx){
  // Coordinate warping — sinusoidal cross-warping
  float warp1 = sin(uv.y*3.0 + t*0.6) * 0.018;
  float warp2 = sin(uv.y*9.0 - t*1.2) * 0.008;
  float warp3 = sin(uv.y*22.0 + t*2.4) * 0.003;
  float cx = 0.5 + warp1 + warp2 + warp3 + dx;

  // Multi-layer fractal noise — turbulence inside the beam
  float n1 = snoise(vec2(uv.x*4.0, uv.y*2.0 - t*0.6));
  float n2 = snoise(vec2(uv.x*16.0, uv.y*8.0 - t*1.8));
  float n3 = snoise(vec2(uv.x*40.0, uv.y*18.0 - t*4.0));
  float turbulence = n1*0.55 + n2*0.30 + n3*0.15;

  // Beam intensity with inverse-distance glow
  float core = beam(uv, cx, 0.005);
  float mid  = beam(uv, cx, 0.03);
  float halo = beam(uv, cx, 0.18);

  float vMask = smoothstep(0.0, 0.18, uv.y) * smoothstep(1.0, 0.82, uv.y);
  vMask = mix(vMask, 1.0, smoothstep(0.0, 0.05, uv.y) * smoothstep(0.0, 0.05, 1.0-uv.y) * 0.4);
  float burst = (1.0 - smoothstep(0.0, 0.1, uv.y)) + (1.0 - smoothstep(0.0, 0.12, 1.0-uv.y));
  burst *= 0.6;

  float beamI = (core*1.2 + mid*0.55 + halo*0.18) * (vMask + burst);
  beamI *= 0.85 + turbulence * 0.45;
  beamI = max(beamI, 0.0);

  vec3 white   = vec3(1.0, 0.98, 1.05);
  vec3 violet  = vec3(0.55, 0.45, 1.10);
  vec3 deepBlu = vec3(0.20, 0.18, 0.85);
  vec3 col = mix(deepBlu, violet, smoothstep(0.0, 1.5, beamI));
  col = mix(col, white, smoothstep(2.5, 6.0, beamI));
  return col * beamI * 0.42;
}

void main(){
  vec2 uv = v_uv;
  // aspect correct
  uv.x = (uv.x - 0.5) * (u_resolution.x / u_resolution.y) + 0.5;

  float t = u_time;

  // Chromatic aberration — sample R / G / B with slight x offsets
  vec3 r = sampleBeam(uv, t,  0.0030);
  vec3 g = sampleBeam(uv, t,  0.0000);
  vec3 b = sampleBeam(uv, t, -0.0030);
  vec3 col = vec3(r.r, g.g, b.b);

  vec3 bg = vec3(0.018, 0.018, 0.035);
  vec3 final = bg + col;
  // Soft tonemap
  final = final / (final + vec3(1.0));
  final = pow(final, vec3(0.85));

  // Vignette — fade beam at horizontal edges so it dissolves into ambient bg
  float edgeMask = smoothstep(0.0, 0.45, v_uv.x) * smoothstep(1.0, 0.55, v_uv.x);
  // Slight vertical fade too so beam feels anchored, not a pillar
  float vEdge = smoothstep(0.0, 0.05, v_uv.y) * smoothstep(1.0, 0.95, v_uv.y);
  final *= (0.18 + edgeMask * 0.95) * (0.6 + vEdge * 0.4);

  gl_FragColor = vec4(final, 1.0);
}
</script>

<script id="vert-shader" type="x-shader/x-vertex">
attribute vec2 a_pos;
varying vec2 v_uv;
void main(){
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}
</script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;

/* ====================== ENERGY BEAM CANVAS ====================== */
function EnergyBeam() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    const gl = canvas.getContext("webgl", { antialias: true, alpha: true, premultipliedAlpha: false });
    if (!gl) return;

    const vsSrc = document.getElementById("vert-shader").textContent;
    const fsSrc = document.getElementById("frag-shader").textContent;

    function compile(type, src){
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.warn("shader err", gl.getShaderInfoLog(s));
      }
      return s;
    }
    const vs = compile(gl.VERTEX_SHADER, vsSrc);
    const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
    const prog = gl.createProgram();
    gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const aPos = gl.getAttribLocation(prog, "a_pos");
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
    const uRes = gl.getUniformLocation(prog, "u_resolution");
    const uT   = gl.getUniformLocation(prog, "u_time");

    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    function size(){
      const w = canvas.clientWidth, h = canvas.clientHeight;
      canvas.width  = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      gl.viewport(0,0, canvas.width, canvas.height);
    }
    size();
    const ro = new ResizeObserver(size);
    ro.observe(canvas);

    let raf, start = performance.now();
    function loop(now){
      const t = (now - start) / 1000;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uT, t);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      raf = requestAnimationFrame(loop);
    }
    raf = requestAnimationFrame(loop);
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, []);
  return (
    <canvas ref={canvasRef} className="absolute inset-0 w-full h-full" style={{display:"block"}} aria-hidden/>
  );
}

      <div className="flex items-center justify-between mt-7 px-2 text-[12px] text-[var(--mute)]">
        <span>© 2026 Kova — Intelligent systems for modern businesses.</span>
        <span className="font-mono tracking-[0.16em] uppercase">v.26.II</span>
      </div>
    </section>
  );
}

/* ====================== APP ====================== */
function App() {
  useEffect(()=>{
    function onMove(e){
      const card = e.target.closest && e.target.closest(".surface");
      if (!card) return;
      const r = card.getBoundingClientRect();
      card.style.setProperty("--mx", `${e.clientX - r.left}px`);
      card.style.setProperty("--my", `${e.clientY - r.top}px`);
    }
    document.addEventListener("mousemove", onMove);
    return ()=>document.removeEventListener("mousemove", onMove);
  },[]);
  return (
    <div className="relative min-h-screen text-[var(--bone)]">
      <div className="ambient-bg" aria-hidden></div>
      <div className="smoke" aria-hidden>
        <div className="blob b1"></div>
        <div className="blob b2"></div>
        <div className="blob b3"></div>
        <div className="blob b4"></div>
      </div>
      <div className="beam-canvas" aria-hidden><EnergyBeam/></div>
      <div className="relative flex flex-col" style={{zIndex: 2}}>
        <Topbar/>
        <Hero/>
        <Services/>
        <Metrics/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
